# Wrangler configuration for Cloudflare Workers deployment
# Update the name, account_id, and other fields as needed
name = "ai-caption-backend"
main = "dist/worker.js"
compatibility_date = "2025-08-04"

[build]
command = "npm run build"

# Environment variables (uncomment and add your actual values)
# [vars]
# PUBLIC_CONVEX_URL = "your-convex-url"
# BASE_URL = "your-base-url"

[observability.logs]
enabled = true

# Secrets (set these using: wrangler secret put SECRET_NAME)
# Run these commands to set your secrets:
# wrangler secret put CLERK_SECRET_KEY
# wrangler secret put CLERK_PUBLISHABLE_KEY
# wrangler secret put GOOGLE_API_KEY
